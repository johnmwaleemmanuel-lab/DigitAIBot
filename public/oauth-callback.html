<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Connecting to Deriv…</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0a0a14; --panel:#171728; --border:#262640; --cyan:#00f0ff; --magenta:#ff2e9a; --text:#e8e8f5; --text-dim:#8888a8; }
  * { box-sizing: border-box; }
  body {
    margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    background: var(--bg); color: var(--text); font-family:'Space Grotesk',sans-serif;
  }
  .card {
    background: var(--panel); border:1px solid var(--border); border-radius:18px;
    padding: 32px; max-width: 440px; width: 90%; text-align:center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  h1 { font-size:18px; margin:0 0 8px; }
  p { color: var(--text-dim); font-size: 13px; margin: 0 0 20px; }
  .spinner {
    width:34px; height:34px; margin: 0 auto 18px; border-radius:50%;
    border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--cyan);
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .acct-btn {
    display:block; width:100%; text-align:left; margin-bottom:10px;
    background: rgba(255,255,255,0.03); border:1px solid var(--border); color: var(--text);
    padding: 12px 14px; border-radius: 10px; cursor:pointer; font-family:'JetBrains Mono',monospace;
    font-size: 13px; transition: border-color 0.2s;
  }
  .acct-btn:hover { border-color: var(--cyan); }
  .acct-btn .tag {
    float:right; font-size:10px; padding:2px 8px; border-radius:8px;
    background: linear-gradient(90deg, var(--magenta), var(--cyan)); color:#0a0a14; font-weight:700;
  }
  .error { color: #ff4d6d; font-size: 13px; }
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="spinner" id="spinner"></div>
    <h1 id="title">Connecting to Deriv…</h1>
    <p id="subtitle">Reading your authorization response.</p>
    <div id="accountList"></div>
  </div>

<script>
function parseAccounts(search) {
  const params = new URLSearchParams(search);
  const accounts = [];
  for (let i = 1; i <= 10; i++) {
    const acct = params.get('acct' + i);
    const token = params.get('token' + i);
    const cur = params.get('cur' + i);
    if (!acct || !token) continue;
    // Deriv virtual/demo account ids conventionally start with "VR"
    const accountType = /^VR/i.test(acct) ? 'demo' : 'real';
    accounts.push({ accountId: acct, token, currency: cur || '', accountType });
  }
  return accounts;
}

async function submitAccount(acc) {
  document.getElementById('title').textContent = 'Finishing up…';
  document.getElementById('subtitle').textContent = `Connecting as ${acc.accountId}`;
  document.getElementById('accountList').innerHTML = '';
  document.getElementById('spinner').style.display = 'block';
  try {
    const res = await fetch('/auth/deriv/session', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(acc),
    });
    const data = await res.json();
    if (data.ok) {
      window.location.href = '/';
    } else {
      showError(data.error || 'Could not save session.');
    }
  } catch (e) {
    showError(e.message);
  }
}

function showError(msg) {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('title').textContent = 'Something went wrong';
  document.getElementById('subtitle').innerHTML = `<span class="error">${msg}</span>`;
}

(function init() {
  const accounts = parseAccounts(window.location.search);
  if (accounts.length === 0) {
    showError('No account tokens found in the redirect. Did the authorization complete on Deriv\'s site?');
    return;
  }
  if (accounts.length === 1) {
    submitAccount(accounts[0]);
    return;
  }
  // Multiple accounts (e.g. real + demo) — let the user choose, never
  // auto-pick a real-money account silently.
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('title').textContent = 'Choose an account';
  document.getElementById('subtitle').textContent = 'Deriv returned more than one account for this login.';
  const list = document.getElementById('accountList');
  accounts.forEach((acc) => {
    const btn = document.createElement('button');
    btn.className = 'acct-btn';
    btn.innerHTML = `${acc.accountId} <span class="tag">${acc.accountType.toUpperCase()}${acc.currency ? ' · ' + acc.currency : ''}</span>`;
    btn.onclick = () => submitAccount(acc);
    list.appendChild(btn);
  });
})();
</script>
</body>
</html>
